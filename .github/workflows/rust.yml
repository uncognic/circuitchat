name: Rust Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Rename binary with version
        run: |
          BIN="circuitchat"
          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
          VERSION="${GITHUB_REF#refs/tags/}"
          mv target/release/$BIN$EXT $BIN-$VERSION-$RUNNER_OS$EXT
        shell: bash

      - name: Generate changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## circuitchat $VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi

          git log $RANGE --pretty=format:"%s (%h)" \
            | grep -v '^\*' \
            | sed 's/^/- /' >> CHANGELOG.md

      - name: Calculate sha256 for source tarball and binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
          BIN="circuitchat-$VERSION-$RUNNER_OS$EXT"

          if command -v sha256sum &>/dev/null; then
            curl -L https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz \
              | sha256sum | awk '{print $1}' > sha256.txt
            sha256sum "$BIN" | awk '{print $1}' > "$BIN.sha256"
          else
            curl -L https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz \
              | shasum -a 256 | awk '{print $1}' > sha256.txt
            shasum -a 256 "$BIN" | awk '{print $1}' > "$BIN.sha256"
          fi
        
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            circuitchat-*
            sha256.txt
          body_path: CHANGELOG.md